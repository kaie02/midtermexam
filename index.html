<!DOCTYPE html>
<html>
  <head>
    <title> Student Registration Form </title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        height: 100vh;
        background-color: Lightblue;
       }

      nav a { 
        font-size: 15px;
        color: Black;
      }
      
    </style>
  </head>

  <body>
  <header>
    <h1> Student Portal </h1>
    <style></style>
  </header>

    <nav>
      <br>
      <a href="#"> Home </a>
      <label> | </label>
      <a href="#"> About </a>
      <label> | </label>
      <a href="#"> Contact </a>
    </nav>

    <main>
      <section>
        <form>
          <label> Name: </label><br>
          <input type="text" name ="fullname"></br></br>

          <label> Email: </label></br>
          <input type="email" name="email"></br></br>

          <label> Password: </label></br>
          <input type="password" name="password"></br></br>

          <label> Birthdate: </label></br>
          <input type="date" name="date"></br></br>

          <label> Gender: </label></br>
          <input type="radio" name="radio"> Male </br>
          <input type="radio" name="radio"> Female </br>

          <label> Course: </label></br>
          <select>
            <option> BS IN COMPUTER SCIENCE</option>
            <option> BS IN INFORMATION TECHNOLOGY</option>
            <option> BS IN COMPUTER ENGINEERING</option>
            <option> BS IN ACCOUNTANCY</option>
            <option> BS IN BUSINESS ADMINISTRATION</option>
            <option> BS IN CIVIL ENGINEERING</option>
            <option> BS IN NURSING</option>
          </select><br><br>

          <label> Agreement </label> </br>
          <input type="checkbox" name="checkbox"> 
          I agree to the school terms and policies. </br>
          
          <button type="submit"> Submit </button>
        </form>
      </section>

      
    </main>
  </body>
</html>
